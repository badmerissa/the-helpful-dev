<!-- 3: CIRCUIT MELT — PCB traces, LEDs, electric arc steam -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 250" width="220" height="250">
    <defs>
        <style>
            @keyframes arcUp{0%{transform:translateY(0);opacity:1}65%{opacity:.7}100%{transform:translateY(-58px);opacity:0}}
            @keyframes ledPulse{0%,100%{opacity:.35}50%{opacity:1}}
            @keyframes mugGlow{0%,100%{filter:drop-shadow(0 0 3px #3282B8)}50%{filter:drop-shadow(0 0 12px #BBE1FA) drop-shadow(0 0 22px #3282B8)}}
            @keyframes dashFlow{0%{stroke-dashoffset:24}100%{stroke-dashoffset:0}}
            .a1{animation:arcUp 1.9s ease-out infinite}
            .a2{animation:arcUp 1.9s ease-out .65s infinite}
            .a3{animation:arcUp 1.9s ease-out 1.3s infinite}
            .l1{animation:ledPulse 2s ease-in-out infinite}
            .l2{animation:ledPulse 2s ease-in-out .5s infinite}
            .l3{animation:ledPulse 2s ease-in-out 1s infinite}
            .l4{animation:ledPulse 2s ease-in-out 1.5s infinite}
            .mg{animation:mugGlow 3.2s ease-in-out infinite}
            .tf{stroke-dasharray:8 4;animation:dashFlow .8s linear infinite}
        </style>
        <filter id="gwa" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="gws" x="-80%" y="-80%" width="260%" height="260%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <clipPath id="mc3"><rect x="28" y="90" width="144" height="118" rx="10"/></clipPath>
    </defs>

    <!-- BG -->
    <rect width="220" height="250" fill="#1B262C"/>

    <!-- Electric arc steam (zigzag) -->
    <path class="a1" d="M74 88 L70 76 L76 64 L70 52 L76 40 L71 28" stroke="#BBE1FA" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#gwa)"/>
    <path class="a2" d="M110 88 L115 75 L109 62 L115 49 L109 36 L114 24" stroke="#BBE1FA" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#gwa)"/>
    <path class="a3" d="M146 88 L142 76 L148 64 L142 52 L148 40 L143 28" stroke="#BBE1FA" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#gwa)"/>

    <!-- Mug group with glow pulse -->
    <g class="mg">
        <!-- Handle with trace -->
        <path d="M172 113 C207 113 217 131 217 149 C217 167 207 185 172 185 L172 173 C199 173 205 163 205 149 C205 135 199 125 172 125 Z" fill="#0F4C75" stroke="#3282B8" stroke-width="1"/>
        <path class="tf" d="M172 132 L188 132 L188 166 L172 166" stroke="#3282B8" stroke-width="1.5" fill="none"/>

        <!-- Mug body -->
        <rect x="28" y="90" width="144" height="118" rx="10" fill="#0F4C75"/>

        <!-- All interior PCB elements clipped to mug -->
        <g clip-path="url(#mc3)">
            <!-- Horizontal traces -->
            <line x1="28" y1="128" x2="172" y2="128" stroke="#3282B8" stroke-width="1.5" opacity=".65"/>
            <line x1="28" y1="152" x2="172" y2="152" stroke="#3282B8" stroke-width="1.5" opacity=".65"/>
            <line x1="28" y1="176" x2="172" y2="176" stroke="#3282B8" stroke-width="1.5" opacity=".65"/>
            <!-- Vertical traces -->
            <line x1="68" y1="128" x2="68" y2="176" stroke="#3282B8" stroke-width="1.5" opacity=".65"/>
            <line x1="100" y1="106" x2="100" y2="176" stroke="#3282B8" stroke-width="1.5" opacity=".65"/>
            <line x1="136" y1="128" x2="136" y2="208" stroke="#3282B8" stroke-width="1.5" opacity=".65"/>
            <!-- Animated flowing trace (middle horizontal) -->
            <line class="tf" x1="28" y1="152" x2="172" y2="152" stroke="#BBE1FA" stroke-width="2" opacity=".9"/>

            <!-- CPU chip -->
            <rect x="82" y="136" width="36" height="32" rx="3" fill="#1B262C" stroke="#3282B8" stroke-width="1.5"/>
            <!-- Chip top pins -->
            <line x1="90" y1="136" x2="90" y2="128" stroke="#3282B8" stroke-width="1.5"/>
            <line x1="100" y1="136" x2="100" y2="128" stroke="#3282B8" stroke-width="1.5"/>
            <line x1="110" y1="136" x2="110" y2="128" stroke="#3282B8" stroke-width="1.5"/>
            <!-- Chip bottom pins -->
            <line x1="90" y1="168" x2="90" y2="176" stroke="#3282B8" stroke-width="1.5"/>
            <line x1="100" y1="168" x2="100" y2="176" stroke="#3282B8" stroke-width="1.5"/>
            <line x1="110" y1="168" x2="110" y2="176" stroke="#3282B8" stroke-width="1.5"/>
            <!-- Chip side pins -->
            <line x1="82" y1="145" x2="68" y2="145" stroke="#3282B8" stroke-width="1.5"/>
            <line x1="82" y1="158" x2="68" y2="158" stroke="#3282B8" stroke-width="1.5"/>
            <line x1="118" y1="145" x2="136" y2="145" stroke="#3282B8" stroke-width="1.5"/>
            <line x1="118" y1="158" x2="136" y2="158" stroke="#3282B8" stroke-width="1.5"/>
            <!-- Chip label -->
            <text x="100" y="156" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#BBE1FA">CPU</text>

            <!-- LED nodes -->
            <circle class="l1" cx="68" cy="128" r="5" fill="#BBE1FA" filter="url(#gws)"/>
            <circle class="l2" cx="100" cy="128" r="5" fill="#BBE1FA" filter="url(#gws)"/>
            <circle class="l3" cx="136" cy="128" r="5" fill="#3282B8" filter="url(#gws)"/>
            <circle class="l4" cx="68" cy="176" r="5" fill="#BBE1FA" filter="url(#gws)"/>
            <circle class="l1" cx="100" cy="176" r="5" fill="#3282B8" filter="url(#gws)"/>
            <circle class="l2" cx="136" cy="176" r="5" fill="#BBE1FA" filter="url(#gws)"/>
        </g>

        <!-- Rim -->
        <rect x="28" y="90" width="144" height="16" rx="8" fill="#3282B8"/>
        <!-- Rim trace -->
        <line class="tf" x1="50" y1="98" x2="170" y2="98" stroke="#BBE1FA" stroke-width="1.5" opacity=".7"/>

        <!-- Base -->
        <rect x="18" y="206" width="164" height="10" rx="5" fill="#3282B8"/>
        <rect x="12" y="213" width="176" height="6" rx="3" fill="#0F4C75"/>
    </g>
</svg>
