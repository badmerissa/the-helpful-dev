<!-- 2: TERMINAL BREW — scrolling code in mug terminal -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 250" width="220" height="250">
    <defs>
        <style>
            @keyframes codeScroll{0%{transform:translateY(0)}100%{transform:translateY(-84px)}}
            @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
            @keyframes charFloat{0%{transform:translateY(0);opacity:.9}100%{transform:translateY(-52px);opacity:0}}
            .cs{animation:codeScroll 3.8s linear infinite}
            .bl{animation:blink 1s step-end infinite}
            .cf1{animation:charFloat 2.4s ease-out infinite}
            .cf2{animation:charFloat 2.4s ease-out .9s infinite}
            .cf3{animation:charFloat 2.4s ease-out 1.8s infinite}
        </style>
        <clipPath id="cc"><rect x="30" y="106" width="138" height="90"/></clipPath>
    </defs>

    <!-- BG -->
    <rect width="220" height="250" fill="#1B262C"/>

    <!-- Floating code steam -->
    <text class="cf1" x="62" y="80" font-family="Courier New,monospace" font-size="12" fill="#3282B8" opacity=".85">//</text>
    <text class="cf2" x="100" y="73" font-family="Courier New,monospace" font-size="12" fill="#BBE1FA" opacity=".7">{}</text>
    <text class="cf3" x="136" y="78" font-family="Courier New,monospace" font-size="12" fill="#3282B8" opacity=".85">fn</text>

    <!-- Handle -->
    <path d="M172 113 C207 113 217 131 217 149 C217 167 207 185 172 185 L172 173 C199 173 205 163 205 149 C205 135 199 125 172 125 Z" fill="#3282B8"/>

    <!-- Mug body -->
    <rect x="28" y="90" width="144" height="118" rx="10" fill="#0F4C75"/>

    <!-- Terminal screen -->
    <rect x="30" y="106" width="138" height="90" fill="#1B262C" rx="2"/>

    <!-- Scrolling code (clipped) -->
    <g clip-path="url(#cc)">
        <g class="cs">
            <text x="34" y="117" font-family="Courier New,monospace" font-size="8.5" fill="#3282B8">while(alive) drink();</text>
            <text x="34" y="129" font-family="Courier New,monospace" font-size="8.5" fill="#BBE1FA">0xCAFFEE // hot reload</text>
            <text x="34" y="141" font-family="Courier New,monospace" font-size="8.5" fill="#3282B8">fn brew() -&gt; Coffee {</text>
            <text x="34" y="153" font-family="Courier New,monospace" font-size="8.5" fill="#BBE1FA">  import { caffeine } </text>
            <text x="34" y="165" font-family="Courier New,monospace" font-size="8.5" fill="#3282B8">git commit -m "caffix"</text>
            <text x="34" y="177" font-family="Courier New,monospace" font-size="8.5" fill="#BBE1FA">// TODO: sleep() later</text>
            <text x="34" y="189" font-family="Courier New,monospace" font-size="8.5" fill="#3282B8">01001100 01101111</text>
            <!-- Duplicate block for seamless loop (offset 84px) -->
            <text x="34" y="201" font-family="Courier New,monospace" font-size="8.5" fill="#3282B8">while(alive) drink();</text>
            <text x="34" y="213" font-family="Courier New,monospace" font-size="8.5" fill="#BBE1FA">0xCAFFEE // hot reload</text>
            <text x="34" y="225" font-family="Courier New,monospace" font-size="8.5" fill="#3282B8">fn brew() -&gt; Coffee {</text>
            <text x="34" y="237" font-family="Courier New,monospace" font-size="8.5" fill="#BBE1FA">  import { caffeine } </text>
            <text x="34" y="249" font-family="Courier New,monospace" font-size="8.5" fill="#3282B8">git commit -m "caffix"</text>
            <text x="34" y="261" font-family="Courier New,monospace" font-size="8.5" fill="#BBE1FA">// TODO: sleep() later</text>
            <text x="34" y="273" font-family="Courier New,monospace" font-size="8.5" fill="#3282B8">01001100 01101111</text>
        </g>
    </g>

    <!-- Prompt bar (fixed, drawn on top) -->
    <rect x="30" y="191" width="138" height="15" fill="#0F4C75" rx="2"/>
    <text x="36" y="202" font-family="Courier New,monospace" font-size="9" fill="#BBE1FA">$</text>
    <rect class="bl" x="46" y="192" width="5" height="11" fill="#BBE1FA" rx="1"/>

    <!-- Rim (title bar) -->
    <rect x="28" y="90" width="144" height="16" rx="8" fill="#3282B8"/>
    <circle cx="44" cy="98" r="3.5" fill="#1B262C" opacity=".55"/>
    <circle cx="56" cy="98" r="3.5" fill="#1B262C" opacity=".55"/>
    <circle cx="68" cy="98" r="3.5" fill="#1B262C" opacity=".55"/>
    <text x="130" y="102" text-anchor="middle" font-family="Courier New,monospace" font-size="7.5" fill="#1B262C" opacity=".65">terminal.coffee</text>

    <!-- Base -->
    <rect x="18" y="206" width="164" height="10" rx="5" fill="#3282B8"/>
    <rect x="12" y="213" width="176" height="6" rx="3" fill="#0F4C75"/>
</svg>
