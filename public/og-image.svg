<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0092ae;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00637d;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- White card -->
  <rect x="80" y="80" width="1040" height="470" rx="24" fill="white" opacity="0.95" />

  <!-- Logo placeholder circle -->
  <circle cx="180" cy="200" r="56" fill="#e0f7fa" />
  <text x="180" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#0092ae">THD</text>

  <!-- Site name -->
  <text x="260" y="190" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#0f172a">The Helpful Dev</text>
  <text x="260" y="235" font-family="Arial, sans-serif" font-size="26" fill="#475569">Free Privacy-First Web Apps</text>

  <!-- Divider -->
  <line x1="120" y1="280" x2="1080" y2="280" stroke="#e2e8f0" stroke-width="2" />

  <!-- Tagline -->
  <text x="600" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" fill="#0f172a" font-weight="600">Simple tools for everyday life.</text>
  <text x="600" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#475569">No logins. No data collected. Just stuff that works.</text>

  <!-- App pills -->
  <rect x="120" y="450" width="220" height="48" rx="24" fill="#ecfeff" stroke="#0092ae" stroke-width="1.5" />
  <text x="230" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#0092ae" font-weight="600">Fasting Tracker</text>

  <rect x="360" y="450" width="200" height="48" rx="24" fill="#ecfeff" stroke="#0092ae" stroke-width="1.5" />
  <text x="460" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#0092ae" font-weight="600">Potty Panda</text>

  <rect x="580" y="450" width="160" height="48" rx="24" fill="#ecfeff" stroke="#0092ae" stroke-width="1.5" />
  <text x="660" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#0092ae" font-weight="600">unvAIl</text>

  <rect x="760" y="450" width="200" height="48" rx="24" fill="#ecfeff" stroke="#0092ae" stroke-width="1.5" />
  <text x="860" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#0092ae" font-weight="600">Timeagotchi</text>
</svg>
